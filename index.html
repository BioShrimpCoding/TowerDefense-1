<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desktop Defender</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="mainMenu">
  <h1 style="color:#2196F3; font-size:42px; margin-bottom: 10px;">DESKTOP DEFENDER</h1>
  <h3 style="color:#aaa; margin-bottom: 30px;">Select a Mission Location</h3>
  <div style="display:flex; flex-direction:column; gap:12px;">
    <button class="sys-btn menu-btn" onclick="startGame(0)">Map 1: Sandbox (Random Path)</button>
    <button class="sys-btn menu-btn" onclick="startGame(1)">Map 2: The S-Curve (Set Path)</button>
    <button class="sys-btn menu-btn" onclick="startGame(2)">Map 3: The Spiral (Set Path)</button>
    <button class="sys-btn menu-btn" onclick="startGame(3)">Map 4: River Run (Set Path)</button>
    <button class="sys-btn menu-btn" onclick="startGame(4)">Map 5: The Maze (Set Path)</button>
  </div>
</div>

<div id="game-root" style="display:none;">
  <div id="ui">
    <div class="stats-group">
      <div style="color:#ffd700;">$<br><span id="goldDisplay">250</span></div>
      <div style="color:#ff4444;">❤<br><span id="livesDisplay">20</span></div>
      <div>WAVE<br><span id="waveDisplay">0</span></div>
      <div style="display:flex; gap:4px; margin-left:4px; width: auto;">
        <button id="pauseBtn" class="sys-btn" onclick="togglePause()">PAUSE</button>
        <button id="speedBtn" class="sys-btn" onclick="toggleSpeed()">1×</button>
        <button id="muteBtn" class="sys-btn" onclick="toggleMute()">🎵 PLAY MUSIC</button>
        <button class="sys-btn remove-btn" onclick="restartGame()">RESTART</button>
        <button class="sys-btn" onclick="returnToMenu()">MAPS</button>
      </div>
    </div>
    <div class="shop-group">
      <button id="btn_PISTOL" onclick="setBuildType('PISTOL')">Pistol<br>$50</button>
      <button id="btn_SNIPER" onclick="setBuildType('SNIPER')">Sniper<br>$150</button>
      <button id="btn_MINIGUN" onclick="setBuildType('MINIGUN')">Gatling<br>$300</button>
      <button id="btn_FLAME" onclick="setBuildType('FLAME')">Flame<br>$175</button>
      <button id="btn_ICE" onclick="setBuildType('ICE')" class="ice-btn">Ice<br>$125</button>
      <button id="btn_BOMB" onclick="setBuildType('BOMB')">Artillery<br>$200</button>
      <button id="btn_ACCEL" onclick="setBuildType('ACCEL')" class="accel-btn">Accel<br>$500</button>
      <button id="btn_BUFF" onclick="setBuildType('BUFF')">Buff<br>$150</button>
      <button id="btn_RAILGUN" onclick="setBuildType('RAILGUN')" style="border-color:#E91E63;">Railgun<br>$800</button>
      <button id="btn_FARM" onclick="setBuildType('FARM')" class="farm-btn">Farm<br>$250</button>
    </div>
    
    <div id="upgradeMenu">
      <button id="targetBtn" onclick="cycleTargeting()" style="width: 70px;">First</button>
      
      <div id="standardUpgrades" style="display:flex;gap:4px;">
        <button id="btnUpgradeSpeed" onclick="upgradeSpeed()">Speed</button>
        <button id="btnUpgradeDamage" onclick="upgradeDamage()">Power</button>
        <button id="btnUpgradeRange" onclick="upgradeRange()">Range</button>
        <button id="btnUpgradeRadar" class="radar-btn" onclick="upgradeRadar()">Radar $150</button>
      </div>
      
      <div id="accelUpgrades" style="display:none;gap:4px;">
        <button id="btnUpgradeDuration" class="accel-choice" onclick="upgradeAccelDuration()">Duration</button>
      </div>
      
      <div id="buffSpecialization" style="display:none;gap:4px;">
        <button class="buff-choice" onclick="setBuffSpec('SPEED')">Speed</button>
        <button class="buff-choice" onclick="setBuffSpec('DAMAGE')">Dmg</button>
        <button class="buff-choice" onclick="setBuffSpec('RANGE')">Range</button>
      </div>
      
      <div id="flameUpgrades" style="display:none;gap:4px;">
        <button id="btnUpgradeMelt" class="flame-choice" onclick="upgradeDefenseMelt()">Def Melt</button>
      </div>
      
      <div id="iceUpgrades" style="display:none;gap:4px;">
        <button id="btnUpgradeSlow" class="ice-btn" onclick="upgradeSlowPower()">Slow Pwr</button>
      </div>

      <div id="farmUpgrades" style="display:none;gap:4px;">
        <button id="btnUpgradeFarm" class="farm-btn" onclick="upgradeFarm()">Yield</button>
      </div>

      <button class="remove-btn" onclick="removeTower()">SELL</button>
    </div>
  </div>

  <div id="gameArea">
    <div id="canvasWrapper">
      <canvas id="gameCanvas"></canvas>
      <canvas id="pathPreviewCanvas"></canvas>
    </div>
    <div id="sideMenu">
      <div id="statsContent"></div>
      <div id="interestDisplay" style="color:#aaa; font-size:11px; text-align:center; margin-top:5px;"></div>
      <div id="researchMenu">
        <h4 style="color:#ffd700; margin-bottom:5px;">RESEARCH</h4>
        <button onclick="buyResearch('bounty')" id="res_bounty">Bounty Hunter $500</button>
        <button onclick="buyResearch('piercing')" id="res_piercing">Alloy Rounds $600</button>
        <button onclick="buyResearch('interest')" id="res_interest">Bank Interest $750</button>
      </div>
      <div id="wavePreview">
        <h4>NEXT WAVE</h4>
        <div id="waveComposition"></div>
      </div>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
